<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Digital</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f2f5;
        }

        /* Identificador usado no seu link */
        #calculadora {
            background-color: #1e222b;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0px 10px 25px rgba(0, 0, 0, 0.3);
            width: 320px;
        }

        #display {
            width: 100%;
            height: 70px;
            background-color: #2b313d;
            border: none;
            border-radius: 10px;
            margin-bottom: 20px;
            color: #ffffff;
            font-size: 2rem;
            text-align: right;
            padding: 0 15px;
            outline: none;
        }

        .botoes {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            padding: 18px;
            font-size: 1.25rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background-color: #3a4150;
            color: white;
            transition: background 0.2s ease;
        }

        button:active {
            transform: scale(0.95);
        }

        button.operador {
            background-color: #ff9f0a;
            color: white;
        }

        button.operador:hover {
            background-color: #cc7f08;
        }

        button.limpar {
            background-color: #a5a5a5;
            color: black;
        }

        button.limpar:hover {
            background-color: #8e8e8e;
        }

        button.igual {
            background-color: #2ec4b6;
            grid-column: span 2;
        }

        button.igual:hover {
            background-color: #259d92;
        }

        button:hover {
            background-color: #4f576b;
        }
    </style>
</head>
<body>

    <!-- Container principal com a ID do seu link -->
    <div id="calculadora">
        <input type="text" id="display" readonly placeholder="0">
        
        <div class="botoes">
            <button class="limpar" onclick="limparDisplay()">C</button>
            <button class="operador" onclick="inserir('/')">/</button>
            <button class="operador" onclick="inserir('*')">x</button>
            <button class="operador" onclick="inserir('-')">-</button>
            
            <button onclick="inserir('7')">7</button>
            <button onclick="inserir('8')">8</button>
            <button onclick="inserir('9')">9</button>
            <button class="operador" onclick="inserir('+')">+</button>
            
            <button onclick="inserir('4')">4</button>
            <button onclick="inserir('5')">5</button>
            <button onclick="inserir('6')">6</button>
            <button onclick="inserir('.')">,</button>
            
            <button onclick="inserir('1')">1</button>
            <button onclick="inserir('2')">2</button>
            <button onclick="inserir('3')">3</button>
            <button onclick="inserir('0')">0</button>
            
            <button class="igual" onclick="calcular()">=</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');

        function inserir(valor) {
            if (display.value === 'Erro') {
                display.value = '';
            }
            display.value += valor;
        }

        function limparDisplay() {
            display.value = '';
        }

        function calcular() {
            try {
                // Avalia a expressão matemática digitada
                if (display.value) {
                    display.value = eval(display.value);
                }
            } catch (error) {
                display.value = 'Erro';
            }
        }
    </script>
</body>
</html>
