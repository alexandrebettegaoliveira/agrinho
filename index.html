<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroTech Pro - Inteligência e Produtividade no Campo</title>
    
    <!-- ESTILOS VISUAIS (CSS) -->
    <style>
        /* Configurações Gerais */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            scroll-behavior: smooth;
        }

        :root {
            --primary: #1b4332;
            --primary-light: #2d6a4f;
            --accent: #52b788;
            --accent-light: #d8f3dc;
            --dark: #081c15;
            --light: #f4f9f4;
            --gray: #666;
            --white: #ffffff;
        }

        body {
            background-color: var(--light);
            color: var(--dark);
            padding-top: 80px;
        }

        section {
            padding: 80px 8%;
        }

        h2.section-title {
            font-size: 36px;
            color: var(--primary);
            text-align: center;
            margin-bottom: 10px;
        }

        p.section-subtitle {
            text-align: center;
            color: var(--gray);
            margin-bottom: 50px;
            font-size: 16px;
        }

        /* Menu de Navegação */
        header {
            background-color: var(--primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        header .logo {
            color: var(--white);
            font-size: 24px;
            font-weight: bold;
        }

        header .logo span {
            color: var(--accent);
        }

        nav a {
            color: var(--white);
            text-decoration: none;
            margin-left: 20px;
            font-weight: 500;
            transition: 0.3s;
        }

        nav a:hover {
            color: var(--accent);
        }

        /* Banner Hero */
        .hero {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://unsplash.com') no-repeat center center/cover;
            height: 75vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: var(--white);
            padding: 0 20px;
        }

        .hero h1 {
            font-size: 52px;
            margin-bottom: 20px;
            font-weight: 800;
        }

        .hero p {
            font-size: 20px;
            margin-bottom: 35px;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
        }

        .btn {
            background-color: var(--accent);
            color: var(--primary);
            padding: 14px 35px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            transition: 0.3s;
            display: inline-block;
        }

        .btn:hover {
            background-color: var(--primary-light);
            color: var(--white);
            transform: translateY(-2px);
        }

        /* Grid de Soluções */
        .services {
            background-color: var(--white);
        }

        .grid-services {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .card {
            background-color: var(--light);
            padding: 35px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            border-top: 5px solid var(--primary-light);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
        }

        .card h3 {
            color: var(--primary);
            margin-bottom: 15px;
            font-size: 22px;
        }

        /* Painel e Calculadora Avançada */
        .dashboard-section {
            background-color: var(--accent-light);
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
        }

        .calc-box, .chart-box {
            flex: 1;
            min-width: 320px;
            background: var(--white);
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }

        button {
            width: 100%;
            background-color: var(--primary-light);
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: var(--primary);
        }

        .result-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            font-weight: bold;
            display: none;
        }

        /* Gráfico Simulado via CSS */
        .chart-container {
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            height: 200px;
            margin-top: 30px;
            border-left: 2px solid #ccc;
            border-bottom: 2px solid #ccc;
            padding-left: 10px;
        }

        .bar {
            width: 45px;
            background-color: var(--primary-light);
            border-radius: 5px 5px 0 0;
            transition: height 1s ease-in-out;
            position: relative;
            height: 30px; /* inicial */
        }

        .bar-label {
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
        }

        .bar-value {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            font-weight: bold;
            color: var(--primary);
        }

        /* Planos e Preços */
        .pricing {
            background-color: var(--white);
        }

        .grid-pricing {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .price-card {
            background: var(--light);
            padding: 40px 30px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #e0e0e0;
            position: relative;
        }

        .price-card.featured {
            border: 2px solid var(--accent);
            background-color: var(--white);
            transform: scale(1.03);
        }

        .badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--accent);
            color: var(--primary);
            font-size: 12px;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 20px;
        }

        .price-card h3 {
            font-size: 22px;
            color: var(--primary);
            margin-bottom: 15px;
        }

        .price-value {
            font-size: 36px;
            font-weight: bold;
            color: var(--dark);
            margin-bottom: 25px;
        }

        .price-value span {
            font-size: 16px;
            color: var(--gray);
        }

        .price-features {
            list-style: none;
            margin-bottom: 30px;
            text-align: left;
        }

        .price-features li {
            margin-bottom: 12px;
            font-size: 15px;
            color: #444;
        }

        .price-features li::before {
            content: "✓ ";
            color: var(--accent);
            font-weight: bold;
        }

        /* Notícias / Blog */
        .news {
            background-color: var(--light);
        }

        .grid-news {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .news-card {
            background: var(--white);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }

        .news-img {
            height: 180px;
            background-color: #ddd;
            background-size: cover;
            background-position: center;
        }

        .news-content {
            padding: 25px;
        }

        .news-content span {
            font-size: 12px;
            color: var(--accent);
            font-weight: bold;
            text-transform: uppercase;
        }

        .news-content h3 {
            margin: 10px 0;
            color: var(--primary);
        }

        /* Depoimentos */
        .testimonials {
            background: var(--white);
        }

        .grid-testimonials {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .testimonial-card {
            background: var(--light);
            padding: 30px;
            border-radius: 8px;
            font-style: italic;
            position: relative;
</html>
