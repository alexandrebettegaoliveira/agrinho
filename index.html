<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal do Agronegócio Inteligente & Conectado</title>
    
    <!-- Biblioteca Chart.js para o Gráfico Dinâmico -->
    <script src="https://jsdelivr.net"></script>

    <!-- CSS Unificado -->
    <style>
        /* Reset Geral */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            color: #333;
            line-height: 1.6;
            background-color: #fcfcfc;
        }

        /* Navegação */
        header {
            background-color: #1b4332;
            color: #fff;
            padding: 20px 10%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
        }

        .logo span {
            color: #52b788;
        }

        nav ul {
            display: flex;
            list-style: none;
        }

        nav ul li {
            margin-left: 20px;
        }

        nav ul li a {
            color: #fff;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        nav ul li a:hover {
            color: #52b788;
        }

        /* Banner Principal com Carrossel */
        .hero {
            position: relative;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: #fff;
            padding: 0 20px;
            overflow: hidden;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 1s ease-in-out;
            z-index: 1;
        }

        .slide::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.55);
        }

        .slide.active {
            opacity: 1;
            z-index: 2;
        }

        .hero-content {
            position: relative;
            z-index: 3;
            max-width: 800px;
        }

        .hero-content h1 {
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .hero-content p {
            font-size: 20px;
            margin-bottom: 30px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }

        .btn {
            background-color: #52b788;
            color: #fff;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn:hover {
            background-color: #40916c;
        }

        /* Estrutura de Seções */
        .section-padding {
            padding: 80px 10%;
        }

        .section-bg {
            background-color: #f4f9f4;
        }

        h2 {
            font-size: 32px;
            text-align: center;
            color: #1b4332;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 40px;
        }

        /* Grid de Cards */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .card {
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-top: 4px solid #52b788;
        }

        .card h3 {
            margin-bottom: 15px;
            color: #2d6a4f;
        }

        /* Seção de Notícias */
        .news-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 4px;
            margin-bottom: 15px;
        }

        /* Layout Duas Colunas (Sustentabilidade) */
        .two-column {
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            align-items: center;
        }

        .text-block {
            flex: 1;
            min-width: 300px;
        }

        .stat-box {
            flex: 1;
            min-width: 300px;
            display: flex;
            gap: 20px;
        }

        .stat-item {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            flex: 1;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .stat-item .number {
            font-size: 36px;
            font-weight: bold;
            color: #2d6a4f;
        }

        /* Calculadora Agro */
        .calc-box {
            max-width: 500px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .calc-group {
            margin-bottom: 15px;
        }

        .calc-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .calc-group input, .calc-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .calc-result {
            margin-top: 20px;
            padding: 15px;
            background-color: #e8f5e9;
            border-radius: 4px;
            display: none;
        }

        /* Painel do Mercado e Gráficos */
        .market-container {
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
        }

        .market-table, .market-chart {
            flex: 1;
            min-width: 300px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: #2d6a4f;
            color: #fff;
        }

        .text-green { color: #2b9348; font-weight: bold; }
        .text-red { color: #d90429; font-weight: bold; }

        /* Formulário de Contato */
        .contact-form {
            max-width: 600px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        #formFeedback {
            text-align: center;
            margin-top: 20px;
            padding: 10px;
            border-radius: 4px;
            font-weight: bold;
        }

        .success { background-color: #d8f3dc; color: #1b4332; }
        .error { background-color: #f8d7da; color: #721c24; }
        .hidden { display: none; }

        /* Rodapé */
        footer {
            background-color: #1b4332;
            color: #fff;
            text-align: center;
            padding: 20px;
            font-size: 14px;
        }

        /* Responsividade Mobile */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                padding: 15px;
            }
            nav ul {
                margin-top: 15px;
            }
            .hero-content h1 {
                font-size: 32px;
            }
            .section-padding {
                padding: 60px 5%;
            }
        }
    </style>
</head>
<body>

    <!-- Cabeçalho e Navegação -->
    <header>
        <div class="logo">Agro<span>Futuro</span></div>
        <nav>
            <ul>
                <li><a href="#home">Início</a></li>
                <li><a href="#tecnologia">Tecnologia</a></li>
                <li><a href="#noticias">Notícias</a></li>
                <li><a href="#sustentabilidade">Sustentabilidade</a></li>
                <li><a href="#calculadora">Calculadora</a></li>
                <li><a href="#mercado">Mercado</a></li>
                <li><a href="#contato">Contato</a></li>
            </ul>
        </nav>
    </header>

    <!-- Seção Banner Principal com Carrossel Automático -->
    <section id="home" class="hero">
        <div class="slide active" style="background-image: url('https://unsplash.com');"></div>
        <div class="slide" style="background-image: url('https://unsplash.com');"></div>
        <div class="slide" style="background-image: url('https://unsplash.com');"></div>
        
        <div class="hero-content">
            <h1 id="heroTitle">O Futuro da Agricultura é Tecnológico</h1>
            <p id="heroDesc">Conectando inovação, produtividade e sustentabilidade no campo.</p>
            <a href="#tecnologia" class="btn">Saiba Mais</a>
        </div>
    </section>

    <!-- Seção de Tecnologia -->
    <section id="tecnologia" class="section-padding">
    </section>
</body>
</html>
